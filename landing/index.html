<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GoMail</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f3ea;
        color: #202124;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(720px, calc(100% - 40px));
      }
      h1 {
        margin: 0 0 12px;
        font-size: 72px;
        line-height: 0.95;
        letter-spacing: 0;
      }
      p {
        margin: 0 0 24px;
        max-width: 560px;
        color: #5b605f;
        font-size: 18px;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 6px;
        background: #1f6f64;
        color: white;
        font-weight: 700;
        text-decoration: none;
      }
      @media (max-width: 560px) {
        h1 {
          font-size: 44px;
        }
        p {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GoMail</h1>
      <p>Inbound email, custom domains, and static website hosting from one self-hosted control panel.</p>
      <a href="/app/">Open app</a>
    </main>
  </body>
</html>
